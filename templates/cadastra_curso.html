<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Cursos</title>
    <style>
        /* Reset básico e tipografia */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Container do Formulário */
        form {
            background-color: #ffffff;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }

        h1 {
            color: #333;
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
            text-align: center;
        }

        /* Estilização dos campos */
        p {
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #666;
            font-weight: 600;
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #4a90e2;
            box-shadow: 0 0 5px rgba(74, 144, 226, 0.2);
        }

        /* Botão */
        button {
            width: 100%;
            padding: 0.8rem;
            background-color: #4a90e2;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #357abd;
        }

        /* Responsividade básica */
        @media (max-width: 480px) {
            form {
                margin: 1rem;
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    
    <form action="/cursos" method="post">
        <h1>Cadastrar Cursos</h1>
        
        <p>
            <label for="nome">Nome do Curso</label>
            <input type="text" id="nome" name="nome" placeholder="Ex: Programação Web" required>
        </p>

        <p>
            <label for="carga_horaria">Carga Horária (horas)</label>
            <input type="number" id="carga_horaria" name="carga_horaria" placeholder="Ex: 40" required>
        </p>

        <p>
            <label for="descricao">Descrição Curta</label>
            <input type="text" id="descricao" name="descricao" placeholder="Resumo do curso">
        </p>

        <p>
            <button type="submit">Cadastrar Curso</button>
        </p>
    </form>

</body>
</html>
